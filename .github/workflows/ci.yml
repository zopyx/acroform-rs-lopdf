name: CI

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  test-rust:
    name: Test Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run Rust tests
        run: cargo test --locked --package acroform

  test-python:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          uv pip install maturin pytest ruff mypy

      - name: Build Python package (develop mode)
        run: |
          uv run maturin develop --release

      - name: Run Python tests
        run: |
          uv run pytest python/tests/ -v

      - name: Run Python linters
        run: |
          uv run ruff check python/
          uv run mypy python/acroform
        if: matrix.python-version == '3.12'

  check-format:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          uv pip install ruff

      - name: Check Rust formatting
        run: cargo fmt -- --check

      - name: Check Python formatting
        run: |
          uv run ruff format --check python/

  summary:
    name: CI Summary
    needs: [test-rust, test-python, check-format]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## CI Summary"
          echo ""
          
          if [ "${{ needs.test-rust.result }}" == "success" ]; then
            echo "✓ Rust tests passed"
          elif [ "${{ needs.test-rust.result }}" == "skipped" ]; then
            echo "⊘ Rust tests skipped"
          else
            echo "✗ Rust tests failed"
          fi
          
          if [ "${{ needs.test-python.result }}" == "success" ]; then
            echo "✓ Python tests passed (3.12, 3.13, 3.14)"
          elif [ "${{ needs.test-python.result }}" == "skipped" ]; then
            echo "⊘ Python tests skipped"
          else
            echo "✗ Python tests failed"
          fi
          
          if [ "${{ needs.check-format.result }}" == "success" ]; then
            echo "✓ Formatting checks passed"
          elif [ "${{ needs.check-format.result }}" == "skipped" ]; then
            echo "⊘ Formatting checks skipped"
          else
            echo "✗ Formatting checks failed"
          fi
          
          # Exit with failure if any job failed
          if [ "${{ contains(needs.*.result, 'failure') }}" == "true" ]; then
            echo ""
            echo "⚠️  One or more CI jobs failed"
            exit 1
          fi
